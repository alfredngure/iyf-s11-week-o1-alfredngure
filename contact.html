<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
</head>
<body>

    <main>
        <section>
            <h2>Contact Me</h2>
            
            <!-- Task 2.2: Contact Form -->
            <form action="#" method="POST">
                <fieldset>
                    <legend>Send a Message</legend>

                    <!-- Full Name (text input, required) -->
                    <p>
                        <label for="full-name">Full Name:</label>
                        <input type="text" id="full-name" name="fullName" placeholder="Jane Doe" required>
                    </p>

                    <!-- Email (email input, required, with validation) -->
                    <p>
                        <label for="email">Email Address:</label>
                        <input type="email" id="email" name="email" placeholder="jane.doe@example.com" required>
                    </p>

                    <!-- Phone (tel input, optional) -->
                    <p>
                        <label for="phone">Phone Number (Optional):</label>
                        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000">
                    </p>

                    <!-- Subject (dropdown select with 3 options) -->
                    <p>
                        <label for="subject">Subject:</label>
                        <select id="subject" name="subject">
                            <option value="general">General Inquiry</option>
                            <option value="project">Project Collaboration</option>
                            <option value="freelance">Freelance / Hiring</option>
                        </select>
                    </p>

                    <!-- Message (textarea, required, min 50 characters) -->
                    <p>
                        <label for="message">Message:</label>
                        <br>
                        <textarea id="message" name="message" rows="6" cols="50" minlength="50" placeholder="Please type your message here (minimum 50 characters required)..." required></textarea>
                    </p>

                    <!-- Newsletter subscription (checkbox) -->
                    <p>
                        <input type="checkbox" id="newsletter" name="newsletter" value="subscribe">
                        <label for="newsletter">Subscribe to my newsletter</label>
                    </p>

                    <!-- Submit button -->
                    <p>
                        <button type="submit">Submit</button>
                    </p>
                </fieldset>
            </form>
            
        </section>
    </main>

</body>
</html>
